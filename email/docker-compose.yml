services:
  injector-email:
    image: openaev/injector-email:latest
    environment:
      - OPENAEV_URL=${OPENAEV_URL}
      - OPENAEV_TOKEN=${OPENAEV_TOKEN}
      - INJECTOR_ID=${INJECTOR_ID}
      - INJECTOR_NAME=${INJECTOR_NAME}
      - INJECTOR_LOG_LEVEL=${INJECTOR_LOG_LEVEL}
      - INJECTOR_SMTP_HOSTNAME=${INJECTOR_SMTP_HOSTNAME}
      - INJECTOR_SMTP_PORT=${INJECTOR_SMTP_PORT}
      - INJECTOR_SMTP_USE_TLS=${INJECTOR_SMTP_USE_TLS}
      - INJECTOR_SMTP_USERNAME=${INJECTOR_SMTP_USERNAME}
      - INJECTOR_SMTP_PASSWORD=${INJECTOR_SMTP_PASSWORD}
    restart: always
